# GitHub Actions Workflow for SSRS Deployment
# Copy this file to .github/workflows/deploy-ssrs.yml in your repository

name: Deploy SSRS Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

env:
  # Configuration will be read from deployment-config.json
  # Only environment, username, and password are needed

jobs:
  # Job 1: Deploy to Development on any push to develop branch
  deploy-dev:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Deploy to Development Environment
      run: |
        Write-Host "Deploying to Development Environment..."
        .\Deploy-SSRS.ps1 `
          -Environment "Dev" `
          -User "${{ secrets.DEV_SSRS_USERNAME }}" `
          -Password "${{ secrets.DEV_SSRS_PASSWORD }}" `
          -Force
      shell: powershell
      
    - name: Upload Deployment Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: deployment-logs-dev
        path: Logs/
        retention-days: 30

  # Job 2: Deploy to Production on push to main branch
  deploy-prod:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: []  # No dependencies, runs independently
    environment: production  # Use GitHub environment protection
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Validate Deployment (WhatIf)
      run: |
        Write-Host "Validating Production Deployment..."
        .\Deploy-SSRS.ps1 `
          -Environment "Prod" `
          -User "${{ secrets.PROD_SSRS_USERNAME }}" `
          -Password "${{ secrets.PROD_SSRS_PASSWORD }}" `
          -WhatIf
      shell: powershell
    
    - name: Deploy to Production Environment
      run: |
        Write-Host "Deploying to Production Environment..."
        .\Deploy-SSRS.ps1 `
          -Environment "Prod" `
          -User "${{ secrets.PROD_SSRS_USERNAME }}" `
          -Password "${{ secrets.PROD_SSRS_PASSWORD }}" `
          -Force
      shell: powershell
      
    - name: Upload Deployment Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: deployment-logs-prod
        path: Logs/
        retention-days: 90

  # Job 3: Test Deployment (runs on pull requests)
  test-deployment:
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Test Deployment (WhatIf Mode)
      run: |
        Write-Host "Testing Deployment Configuration..."
        .\Deploy-SSRS.ps1 `
          -Environment "Dev" `
          -User "${{ secrets.DEV_SSRS_USERNAME }}" `
          -Password "${{ secrets.DEV_SSRS_PASSWORD }}" `
          -WhatIf
      shell: powershell
      
    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ SSRS Deployment test completed successfully! Check the workflow logs for details.'
          })

# Required GitHub Secrets:
# Repository Settings → Secrets and Variables → Actions
#
# Development Environment:
# - DEV_SSRS_USERNAME: domain\svc-ssrs-dev
# - DEV_SSRS_PASSWORD: your-dev-password
#
# Production Environment:
# - PROD_SSRS_USERNAME: domain\svc-ssrs-prod
# - PROD_SSRS_PASSWORD: your-prod-password
#
# Note: ReportServerUrl and TargetFolder will be read from Config/deployment-config.json
# based on the Environment parameter (Dev/Test/Prod)
#
# Optional: Create GitHub Environments for additional security
# Repository Settings → Environments → New Environment
# - Create "production" environment with protection rules
# - Require reviewers for production deployments
